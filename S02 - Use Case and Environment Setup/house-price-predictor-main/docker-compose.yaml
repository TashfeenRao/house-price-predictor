services:
  fastapi:
    image: tashfeenrao/house-price-predictor
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
  
  streamlit:
    image: tashfeenrao/streamlit-app
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "8501:8501"

    environment:
      API_URL: http://fastapi:8000